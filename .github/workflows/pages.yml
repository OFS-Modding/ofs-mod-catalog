name: Publish signed catalog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: catalog-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - name: Build publication directory
        run: |
          mkdir -p _site
          cp public/catalog.json public/loader.json _site/
          cp -r public/icons _site/
          touch _site/.nojekyll
      - name: Sign published catalog
        env:
          OFS_CATALOG_PRIVATE_KEY_PEM: ${{ secrets.OFS_CATALOG_PRIVATE_KEY_PEM }}
        run: node scripts/sign-catalog.mjs _site/catalog.signed.json
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
